name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: golangci/golangci-lint-action@v7

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go test -race -count=1 -coverprofile=coverage.out ./...
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage.out

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: golang/govulncheck-action@v1
        with:
          go-version-input: '1.25'
    continue-on-error: true

  e2e:
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, lio]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: sudo go test -tags e2e -race -count=1 -v ./test/e2e/
